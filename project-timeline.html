<!--
╔══════════════════════════════════════════════════════════════════╗
║   機率部門專案時程管理儀表板 — 設定指南                          ║
╠══════════════════════════════════════════════════════════════════╣
║                                                                  ║
║ 步驟 1：建立 Google Sheet                                       ║
║   建立一個新的 Google Sheet，包含兩個工作表：                     ║
║   • 工作表 1 名稱：「進行中」                                    ║
║   • 工作表 2 名稱：「已完成」                                    ║
║   兩個工作表的欄位結構完全相同（第一列為標題列）：                 ║
║     A: 機台名稱                                                  ║
║     B: 負責人                                                    ║
║     C: 目前階段                                                  ║
║     D: 預計開始日 (格式: YYYY-MM-DD)                             ║
║     E: 預計結束日 (格式: YYYY-MM-DD)                             ║
║     F: 實際開始日 (格式: YYYY-MM-DD)                             ║
║     G: 實際結束日 (格式: YYYY-MM-DD)                             ║
║     H: 備註                                                      ║
║                                                                  ║
║   「目前階段」欄位限定以下值之一：                                ║
║     未開始、規劃中、設計中、開發中、測試中、送審中、修正中、      ║
║     待上線、已完成                                                ║
║                                                                  ║
║ 步驟 2：權限設定                                                 ║
║   「共用」設定：                                                  ║
║   • 編輯者：呱老大 + 各負責工程師                                ║
║   • 檢視者：「知道連結的任何人」（必須，否則儀表板無法讀取）      ║
║   （不需要「發佈到網路」，gviz 端點只需檢視權限即可）            ║
║                                                                  ║
║ 步驟 3：設定 Sheet ID                                           ║
║   將 Sheet ID 貼到 CONFIG.SHEET_ID 變數中                        ║
║   （目前已設定為：10_RMNf8IluvwZyPUUGrLDupcK09aaXGTVqJxEkXLSt8）║
║                                                                  ║
║ 步驟 4：部署 Apps Script（啟用編輯功能）                         ║
║   a. 在 Google Sheet 中：擴充功能 → Apps Script                  ║
║   b. 將 apps-script-code.gs 內容貼入 Code.gs                    ║
║   c. 部署 → 新增部署 → 類型「網頁應用程式」                      ║
║   d. 執行身分：自己 / 存取權限：任何人                           ║
║   e. 部署後複製 Web App URL，貼入 CONFIG.APPS_SCRIPT_URL         ║
║   （若不設定 APPS_SCRIPT_URL，儀表板為純閱讀模式）               ║
║                                                                  ║
╚══════════════════════════════════════════════════════════════════╝
-->
<!DOCTYPE html>

<head>

<style>

body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8f9fa; color: #333; padding: 24px; line-height: 1.5; }
.dashboard-header { text-align: center; margin-bottom: 32px; }
.dashboard-title { font-size: 26px; color: #1a1a2e; font-weight: 700; }

.loading { text-align: center; padding: 40px; color: #888; font-size: 15px; }
.loading::after { content: ''; display: inline-block; width: 16px; height: 16px; border: 2px solid #ddd; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 8px; vertical-align: middle; }

.legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 14px; }

/* Modal */

.modal h3 { font-size: 18px; color: #1a1a2e; margin-bottom: 20px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
.form-group textarea { resize: vertical; height: 60px; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: #6366f1; }

}

<div class="dashboard-header">
  <h1 class="dashboard-title">機率部門專案時程管理儀表板</h1>
  <p class="dashboard-subtitle">產生時間：<span id="gen-time"></span> | 呱集團 機率部門</p>

<script>
// ╔═══════════════════════════════════════════╗
// ║        設定區 — 只需修改這裡              ║
// ╚═══════════════════════════════════════════╝
const CONFIG = {
  SHEET_ID: '10_RMNf8IluvwZyPUUGrLDupcK09aaXGTVqJxEkXLSt8',
  SHEET_ACTIVE: '進行中',
  SHEET_DONE: '已完成',

  // Apps Script Web App URL（部署後貼這裡，啟用編輯功能）
  // 留空 = 純閱讀模式
  APPS_SCRIPT_URL: ''
};

// ═══════════════════════════════════════════
const STAGES = ['未開始','規劃中','設計中','開發中','測試中','送審中','修正中','待上線','已完成'];
const STAGE_COLORS = {
  '未開始':'#9ca3af','規劃中':'#eab308','設計中':'#3b82f6','開發中':'#10b981',
  '測試中':'#8b5cf6','送審中':'#f97316','修正中':'#ef4444','待上線':'#06b6d4','已完成':'#22c55e'
};
const DEMO_DATA = [
  { name:'龍之谷 v2.0', owner:'阿凱', stage:'開發中', planStart:'2026-06-02', planEnd:'2026-08-10', actualStart:'2026-06-02', actualEnd:'', note:'核心玩法重構', _sheet:'進行中', _row:2 },
  { name:'麻將至尊', owner:'小美', stage:'測試中', planStart:'2026-05-12', planEnd:'2026-07-20', actualStart:'2026-05-12', actualEnd:'', note:'第二輪 QA 進行中', _sheet:'進行中', _row:3 },
  { name:'水果盤 Deluxe', owner:'志明', stage:'設計中', planStart:'2026-06-16', planEnd:'2026-09-07', actualStart:'2026-06-23', actualEnd:'', note:'美術需求待確認', _sheet:'進行中', _row:4 },
  { name:'百家樂 Pro', owner:'阿杰', stage:'送審中', planStart:'2026-04-14', planEnd:'2026-06-29', actualStart:'2026-04-14', actualEnd:'', note:'GLI 文件已送出', _sheet:'進行中', _row:5 },
  { name:'幸運輪盤', owner:'雅婷', stage:'規劃中', planStart:'2026-07-07', planEnd:'2026-09-28', actualStart:'', actualEnd:'', note:'等待企劃定案', _sheet:'進行中', _row:6 }
];

let projects = [];
const canEdit = () => !!CONFIG.APPS_SCRIPT_URL;

// ═══ Google Sheet Read (gviz) ═══
function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  const results = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = parseCSVLine(lines[i]);
    if (cols.length >= 3) results.push({ name:cols[0]||'', owner:cols[1]||'', stage:cols[2]||'', planStart:cols[3]||'', planEnd:cols[4]||'', actualStart:cols[5]||'', actualEnd:cols[6]||'', note:cols[7]||'' });
  }
  return results;
}
function parseCSVLine(line) {
  const result = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQ) { if (ch === '"' && line[i+1] === '"') { cur += '"'; i++; } else if (ch === '"') inQ = false; else cur += ch; }
    else { if (ch === '"') inQ = true; else if (ch === ',') { result.push(cur.trim()); cur = ''; } else cur += ch; }
  }
  result.push(cur.trim()); return result;
}
function gvizURL(sheetName, format) { return `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:${format}&sheet=${encodeURIComponent(sheetName)}`; }
function parseGvizJSON(text) {
  const m = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]+)\);?\s*$/);
  const json = JSON.parse(m ? m[1] : text);
  return json.table.rows.map(row => { const c = row.c||[]; const v = i => (c[i]&&c[i].v!=null)?String(c[i].v):''; return { name:v(0), owner:v(1), stage:v(2), planStart:v(3), planEnd:v(4), actualStart:v(5), actualEnd:v(6), note:v(7) }; });
}

async function fetchSheetGviz(sheetName) {
  try { const r = await fetch(gvizURL(sheetName,'csv')); if (r.ok) return parseCSV(await r.text()); } catch(e){}
  const r = await fetch(gvizURL(sheetName,'json')); if (!r.ok) throw new Error(`HTTP ${r.status}`); return parseGvizJSON(await r.text());
}

// ═══ Apps Script CRUD ═══
async function apiCall(body) {
  const r = await fetch(CONFIG.APPS_SCRIPT_URL, { method:'POST', headers:{'Content-Type':'text/plain'}, body: JSON.stringify(body), redirect:'follow' });
  // Apps Script redirects; fetch with redirect:'follow' handles it
  return r.json();
}
async function apiRead() {
  const r = await fetch(CONFIG.APPS_SCRIPT_URL + '?action=read', { redirect:'follow' });
  return r.json();
}

// ═══ Data Loading ═══
async function loadData() {
  const loading = document.getElementById('loading');
  const errorBanner = document.getElementById('error-banner');
  const sourceNote = document.getElementById('source-note');

  if (!CONFIG.SHEET_ID) {
    projects = DEMO_DATA;
    sourceNote.textContent = '資料來源：內建 Demo 資料（尚未設定 Google Sheet ID）';
    finishLoad(); return;
  }

  try {
    if (canEdit()) {
      // Use Apps Script for reading (includes row numbers)
      const res = await apiRead();
      if (res.success) {
        const active = (res.data.active||[]).map(r => ({...r, _sheet:CONFIG.SHEET_ACTIVE, _row:r.row}));
        const done = (res.data.done||[]).map(r => ({...r, _sheet:CONFIG.SHEET_DONE, _row:r.row}));
        projects = [...active, ...done];
      } else throw new Error(res.error||'API error');
    } else {
      const [active, done] = await Promise.all([fetchSheetGviz(CONFIG.SHEET_ACTIVE), fetchSheetGviz(CONFIG.SHEET_DONE)]);
      projects = [...active.map((p,i)=>({...p,_sheet:CONFIG.SHEET_ACTIVE,_row:i+2})), ...done.map((p,i)=>({...p,_sheet:CONFIG.SHEET_DONE,_row:i+2}))];
    }
    sourceNote.textContent = '資料來源：Google Sheet（即時讀取）';
    finishLoad();
  } catch (e) {
    errorBanner.textContent = `無法讀取 Google Sheet：${e.message}。已切換至 Demo 資料。`;
    errorBanner.style.display = 'block';
    projects = DEMO_DATA;
    sourceNote.textContent = '資料來源：內建 Demo 資料（讀取失敗）';
    finishLoad();
  }
}

function finishLoad() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
  if (canEdit()) document.querySelectorAll('.edit-only').forEach(el => el.style.display = '');
  render();
}

// ═══ Render ═══
function render() { renderKPI(); renderFilters(); renderTable(); renderGantt(); }

function renderKPI() {
  const counts = {}; STAGES.forEach(s => counts[s]=0); projects.forEach(p => counts[p.stage]++);
  const active = projects.length - (counts['已完成']||0) - (counts['未開始']||0);
  document.getElementById('kpi-cards').innerHTML = `
    <div class="metric-card"><div class="metric-label">總機台數</div><div class="metric-value">${projects.length}</div></div>
    <div class="metric-card"><div class="metric-label">進行中</div><div class="metric-value">${active}</div></div>
    <div class="metric-card"><div class="metric-label">已完成</div><div class="metric-value">${counts['已完成']||0}</div></div>
    <div class="metric-card"><div class="metric-label">未開始</div><div class="metric-value">${counts['未開始']||0}</div></div>`;
}

function getFiltered() {
  const o = document.getElementById('filter-owner').value, s = document.getElementById('filter-stage').value;
  return projects.filter(p => (!o||p.owner===o) && (!s||p.stage===s));
}

function stageSelectHTML(current, idx) {
  if (!canEdit()) return `<span class="badge stage-${current}">${current}</span>`;
  return `<select class="stage-select" onchange="quickStageChange(${idx},this.value)">${STAGES.map(s=>`<option value="${s}"${s===current?' selected':''}>${s}</option>`).join('')}</select>`;
}

function renderTable() {
  const filtered = getFiltered();
  const editCol = canEdit() ? '<td class="action-cell"><button class="btn btn-sm btn-edit" onclick="openEditModal(${idx})">✎</button> <button class="btn btn-sm btn-delete" onclick="deleteProject(${idx})">✕</button></td>' : '';
  document.getElementById('table-body').innerHTML = filtered.map(p => {
    const idx = projects.indexOf(p);
    return `<tr>
    <td>${p.name}</td><td>${p.owner}</td>
    <td>${stageSelectHTML(p.stage, idx)}</td>
    <td>${p.planStart}</td><td>${p.planEnd}</td>
    <td>${p.actualStart||'—'}</td><td>${p.actualEnd||'—'}</td><td>${p.note}</td>
    ${canEdit()?`<td class="action-cell"><button class="btn btn-sm btn-edit" onclick="openEditModal(${idx})">✎</button> <button class="btn btn-sm btn-delete" onclick="deleteProject(${idx})">✕</button></td>`:''}</tr>`;
  }).join('');

  document.getElementById('card-list').innerHTML = filtered.map(p => {
    const idx = projects.indexOf(p);
    return `<div class="project-card">
    <div class="project-card-title">${p.name} <span class="badge stage-${p.stage}">${p.stage}</span></div>
    <div class="project-card-row"><span>負責人</span><span>${p.owner}</span></div>
    <div class="project-card-row"><span>預計</span><span>${p.planStart} ~ ${p.planEnd}</span></div>
    <div class="project-card-row"><span>實際</span><span>${p.actualStart||'—'} ~ ${p.actualEnd||'—'}</span></div>
    <div class="project-card-row"><span>備註</span><span>${p.note}</span></div>
    ${canEdit()?`<div class="project-card-actions"><button class="btn btn-sm btn-edit" onclick="openEditModal(${idx})">✎ 編輯</button><button class="btn btn-sm btn-delete" onclick="deleteProject(${idx})">✕ 刪除</button></div>`:''}</div>`;
  }).join('');
}

function renderFilters() {
  const ownerSel = document.getElementById('filter-owner'), stageSel = document.getElementById('filter-stage');
  ownerSel.innerHTML = '<option value="">全部負責人</option>';
  stageSel.innerHTML = '<option value="">全部階段</option>';
  [...new Set(projects.map(p=>p.owner).filter(Boolean))].forEach(o => { ownerSel.innerHTML += `<option value="${o}">${o}</option>`; });
  STAGES.forEach(s => { stageSel.innerHTML += `<option value="${s}">${s}</option>`; });
  ownerSel.onchange = renderTable; stageSel.onchange = renderTable;
}

function weekStart(dateStr) { if (!dateStr) return null; const d = new Date(dateStr); d.setDate(d.getDate()-((d.getDay()+6)%7)); return d; }
function getWeekRange() {
  let min=Infinity, max=-Infinity;
  projects.forEach(p => { [p.planStart,p.planEnd,p.actualStart,p.actualEnd].forEach(d => { if(d){const t=new Date(d).getTime();if(t<min)min=t;if(t>max)max=t;} }); });
  if (min===Infinity){min=Date.now();max=Date.now()+86400000*90;}
  const start=weekStart(new Date(min-86400000*7).toISOString().slice(0,10)), end=new Date(max+86400000*14), weeks=[];
  const cur=new Date(start); while(cur<=end){weeks.push(new Date(cur));cur.setDate(cur.getDate()+7);} return weeks;
}
function renderGantt() {
  const weeks=getWeekRange(), total=weeks.length, container=document.getElementById('gantt-chart');
  let html=`<div class="gantt-header"><div class="gantt-header-label">機台</div><div class="gantt-header-timeline">`;
  weeks.forEach(w=>{html+=`<div class="gantt-week">${w.getMonth()+1}/${w.getDate()}</div>`;});
  html+=`</div></div>`;
  projects.forEach(p=>{
    html+=`<div class="gantt-row"><div class="gantt-row-label" title="${p.name}">${p.name}</div><div class="gantt-row-timeline">`;
    weeks.forEach(()=>{html+=`<div class="gantt-cell"></div>`;});
    if(p.planStart&&p.planEnd){const si=Math.max(0,weeks.findIndex(w=>w>=weekStart(p.planStart)));let ei=weeks.findIndex(w=>w>=weekStart(p.planEnd));ei=ei===-1?total-1:Math.min(ei,total-1);html+=`<div class="gantt-bar-planned" style="left:${si/total*100}%;width:${(ei-si+1)/total*100}%;background:${STAGE_COLORS[p.stage]||'#6366f1'};"></div>`;}
    if(p.actualStart){const as=weekStart(p.actualStart),ae=p.actualEnd?weekStart(p.actualEnd):weekStart(new Date().toISOString().slice(0,10));const si=Math.max(0,weeks.findIndex(w=>w>=as));let ei=weeks.findIndex(w=>w>=ae);ei=ei===-1?total-1:Math.min(ei,total-1);html+=`<div class="gantt-bar-actual" style="left:${si/total*100}%;width:${(ei-si+1)/total*100}%;background:${STAGE_COLORS[p.stage]||'#6366f1'};"></div>`;}
    html+=`</div></div>`;
  });
  container.innerHTML=html;
}

// ═══ CRUD Operations ═══
let editingIdx = -1;

function openAddModal() {
  editingIdx = -1;
  document.getElementById('modal-title').textContent = '新增機台';
  ['f-name','f-owner','f-planStart','f-planEnd','f-actualStart','f-actualEnd','f-note'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-stage').value = '未開始';
  document.getElementById('modal-submit').onclick = submitAdd;
  document.getElementById('modal-overlay').classList.add('active');
}

function openEditModal(idx) {
  editingIdx = idx;
  const p = projects[idx];
  document.getElementById('modal-title').textContent = '編輯機台';
  document.getElementById('f-name').value = p.name;
  document.getElementById('f-owner').value = p.owner;
  document.getElementById('f-stage').value = p.stage;
  document.getElementById('f-planStart').value = p.planStart;
  document.getElementById('f-planEnd').value = p.planEnd;
  document.getElementById('f-actualStart').value = p.actualStart;
  document.getElementById('f-actualEnd').value = p.actualEnd;
  document.getElementById('f-note').value = p.note;
  document.getElementById('modal-submit').onclick = submitEdit;
  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('active'); }

function getFormData() {
  return { name:document.getElementById('f-name').value, owner:document.getElementById('f-owner').value, stage:document.getElementById('f-stage').value, planStart:document.getElementById('f-planStart').value, planEnd:document.getElementById('f-planEnd').value, actualStart:document.getElementById('f-actualStart').value, actualEnd:document.getElementById('f-actualEnd').value, note:document.getElementById('f-note').value };
}

async function submitAdd() {
  const data = getFormData();
  if (!data.name) { alert('請輸入機台名稱'); return; }
  closeModal();
  try { await apiCall({ action:'add', data }); await loadData(); } catch(e) { alert('新增失敗：'+e.message); }
}

async function submitEdit() {
  const p = projects[editingIdx];
  const data = getFormData();
  closeModal();
  try { await apiCall({ action:'update', sheet:p._sheet, row:p._row, data }); await loadData(); } catch(e) { alert('更新失敗：'+e.message); }
}

async function quickStageChange(idx, newStage) {
  const p = projects[idx];
  const data = { name:p.name, owner:p.owner, stage:newStage, planStart:p.planStart, planEnd:p.planEnd, actualStart:p.actualStart, actualEnd:p.actualEnd, note:p.note };
  try { await apiCall({ action:'update', sheet:p._sheet, row:p._row, data }); await loadData(); } catch(e) { alert('更新失敗：'+e.message); }
}

async function deleteProject(idx) {
  const p = projects[idx];
  if (!confirm(`確定要刪除「${p.name}」嗎？`)) return;
  try { await apiCall({ action:'delete', sheet:p._sheet, row:p._row }); await loadData(); } catch(e) { alert('刪除失敗：'+e.message); }
}

// ═══ Init ═══
(function init() {
  // Populate stage select in modal
  const sel = document.getElementById('f-stage');
  STAGES.forEach(s => { sel.innerHTML += `<option value="${s}">${s}</option>`; });
  document.getElementById('gen-time').textContent = new Date().toISOString().slice(0,16).replace('T',' ');
  loadData();
})();
</script>
