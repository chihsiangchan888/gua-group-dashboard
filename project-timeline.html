╔══════════════════════════════════════════════════════════════════╗
║   機率部門專案時程管理儀表板                                      ║
║   Google Sheet 欄位（工作表：進行中）：                          ║
║   A:機台名稱 B:階段名稱 C:計畫開始日 D:計畫結束日               ║
║   E:實際開始日 F:實際結束日 G:負責人 H:備註 I:優先級             ║

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>機率部門專案時程管理儀表板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f8f9fa;color:#333;padding:24px;line-height:1.5}
.header{text-align:center;margin-bottom:28px;position:relative}
.header h1{font-size:24px;color:#1a1a2e;font-weight:700}
.header p{font-size:12px;color:#999;margin-top:4px}
.btn-gear{position:absolute;top:0;right:0;background:none;border:1px solid #ddd;border-radius:8px;width:36px;height:36px;font-size:18px;cursor:pointer;color:#666}
.btn-gear:hover{background:#f3f0ff;border-color:#6366f1;color:#6366f1}
.error-banner{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:12px 16px;margin-bottom:16px;color:#dc2626;font-size:13px;display:none}
.loading{text-align:center;padding:40px;color:#888}
.loading::after{content:'';display:inline-block;width:14px;height:14px;border:2px solid #ddd;border-top-color:#6366f1;border-radius:50%;animation:spin .7s linear infinite;margin-left:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.05);border-left:4px solid #6366f1}
.kpi-label{font-size:11px;color:#888;text-transform:uppercase}
.kpi-val{font-size:26px;font-weight:700;color:#1a1a2e}
.section{background:#fff;border-radius:10px;padding:20px;margin-top:20px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.section-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.section-hdr h2{font-size:16px;color:#1a1a2e;font-weight:600}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.toolbar select,.toolbar input{padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;background:#fff}
.toolbar input{width:160px}
.btn{padding:7px 14px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer}
.btn:hover{opacity:.85}
.btn-primary{background:#6366f1;color:#fff}
.btn-sm{padding:3px 8px;font-size:11px}
.btn-edit{background:#e0f2fe;color:#0369a1}
.btn-delete{background:#fee2e2;color:#dc2626}
.btn-add-stage{background:#d1fae5;color:#047857}
.machine-group{border:1px solid #eee;border-radius:8px;margin-bottom:12px;overflow:hidden}
.machine-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#fafafa;cursor:pointer;user-select:none}
.machine-header:hover{background:#f3f0ff}
.machine-name{font-weight:600;font-size:14px;color:#1a1a2e}
.machine-meta{font-size:12px;color:#888;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.machine-actions{display:flex;gap:6px}
.progress-bar{width:80px;height:6px;background:#eee;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px}
.stage-table{width:100%;border-collapse:collapse;display:none}
.stage-table.open{display:table}
.stage-table th{text-align:left;padding:8px 12px;border-bottom:1px solid #eee;color:#888;font-size:11px;text-transform:uppercase}
.stage-table td{padding:8px 12px;border-bottom:1px solid #f5f5f5;font-size:13px}
.badge{display:inline-block;padding:3px 8px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-green{background:#d1fae5;color:#047857}
.badge-yellow{background:#fff3cd;color:#b8860b}
.badge-red{background:#fee2e2;color:#dc2626}
.priority-高{background:#fee2e2;color:#dc2626}
.priority-中{background:#fff3cd;color:#b8860b}
.priority-低{background:#f1f1f1;color:#888}
.gantt-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.gantt{min-width:800px;position:relative}
.gantt-hdr{display:flex;border-bottom:2px solid #eee}
.gantt-lbl{width:180px;min-width:180px;padding:6px 10px;font-size:11px;color:#888}
.gantt-timeline{display:flex;flex:1}
.gantt-wk{flex:1;text-align:center;padding:4px 2px;font-size:9px;color:#bbb;border-left:1px solid #f0f0f0}
.gantt-group-label{padding:6px 10px;font-size:12px;font-weight:600;color:#1a1a2e;background:#fafafa;border-bottom:1px solid #eee}
.gantt-row{display:flex;border-bottom:1px solid #f8f8f8;min-height:28px;align-items:center}
.gantt-row:hover{background:#fafafa}
.gantt-row-lbl{width:180px;min-width:180px;padding:4px 10px 4px 24px;font-size:12px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-row-tl{display:flex;flex:1;position:relative;height:28px}
.gantt-cell{flex:1;border-left:1px solid #fafafa}
.g-plan{position:absolute;top:4px;height:8px;border-radius:4px;opacity:.4}
.g-actual{position:absolute;top:14px;height:10px;border-radius:4px}
.g-milestone{position:absolute;top:6px;width:12px;height:12px;transform:rotate(45deg);border:2px solid}
.today-line{position:absolute;top:0;bottom:0;width:2px;background:#ef4444;opacity:.7;z-index:10;pointer-events:none}
.today-label{position:absolute;top:-16px;font-size:9px;color:#ef4444;transform:translateX(-50%);white-space:nowrap}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;font-size:11px;color:#666}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-plan{width:16px;height:6px;border-radius:3px;background:#6366f1;opacity:.4}
.legend-actual{width:16px;height:8px;border-radius:3px;background:#6366f1}
.legend-ms{width:8px;height:8px;transform:rotate(45deg);border:2px solid #6366f1;background:#fff}
.legend-today{width:16px;height:2px;background:#ef4444}
.footer{text-align:center;margin-top:28px;padding-top:14px;border-top:1px solid #eee;font-size:11px;color:#bbb}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:1000;justify-content:center;align-items:center}
.modal-bg.active{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;width:90%;max-width:480px;box-shadow:0 16px 48px rgba(0,0,0,.15);max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;margin-bottom:16px;color:#1a1a2e}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;color:#666;margin-bottom:3px}
.fg input,.fg select,.fg textarea{width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px}
.fg textarea{height:50px;resize:vertical}
.fg input:focus,.fg select:focus{outline:none;border-color:#6366f1}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn-cancel{background:#f1f1f1;color:#666}
.settings-list{list-style:none;max-height:280px;overflow-y:auto}
.settings-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f0f0f0}
.settings-item input[type=text]{flex:1;padding:5px 8px;border:1px solid #ddd;border-radius:4px;font-size:13px}
.settings-item input[type=color]{width:32px;height:28px;border:none;cursor:pointer;border-radius:4px}
@media(max-width:768px){body{padding:12px}.header h1{font-size:18px}.grid{grid-template-columns:1fr 1fr}.kpi{padding:12px}.kpi-val{font-size:20px}.section{padding:14px}.gantt-lbl,.gantt-row-lbl{width:120px;min-width:120px;font-size:10px}.machine-header{flex-direction:column;align-items:flex-start;gap:6px}}
@media(max-width:480px){.grid{grid-template-columns:1fr 1fr}.gantt-lbl,.gantt-row-lbl{width:90px;min-width:90px}.toolbar{flex-direction:column}.toolbar select,.toolbar input{width:100%}}
</style>
</head>
<body>
<div class="header">
  <button class="btn-gear edit-only" onclick="openSettings()" style="display:none" title="設定">⚙</button>
  <h1>機率部門專案時程管理儀表板</h1>
  <p><span id="gen-time"></span> | 呱集團 機率部門 | <span id="source-note"></span></p>
</div>
<div class="error-banner" id="error-banner"></div>
<div class="loading" id="loading">正在載入資料</div>
<div id="app" style="display:none">
  <div class="grid" id="kpis"></div>
  <div class="section">
    <div class="section-hdr"><h2>專案總覽</h2><button class="btn btn-primary edit-only" onclick="openAddMachine()" style="display:none">+ 新增機台</button></div>
    <div class="toolbar">
      <select id="filter-status"><option value="active">進行中</option><option value="done">已完成</option><option value="all">全部</option></select>
      <select id="filter-owner"><option value="">全部負責人</option></select>
      <input type="text" id="filter-search" placeholder="搜尋機台名稱...">
    </div>
    <div id="table-area"></div>
  </div>
  <div class="section">
    <div class="section-hdr"><h2>甘特圖（週粒度）</h2></div>
    <div class="gantt-wrap"><div class="gantt" id="gantt"></div></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-plan"></div>計畫區間</div>
      <div class="legend-item"><div class="legend-actual"></div>實際執行</div>
      <div class="legend-item"><div class="legend-ms"></div>Deadline</div>
      <div class="legend-item"><div class="legend-today"></div>今天</div>
    </div>
  </div>
</div>
<div class="footer">由 呱集團 AI Fleet 自動產生</div>
<div class="modal-bg" id="modal-bg"><div class="modal" id="modal-content"></div></div>

<script>
window.onerror=function(msg,url,line){document.getElementById('error-banner').textContent='JS Error: '+msg+' (line '+line+')';document.getElementById('error-banner').style.display='block';};
const CONFIG = {
  SHEET_ID: '10_RMNf8IluvwZyPUUGrLDupcK09aaXGTVqJxEkXLSt8',
  SHEET_NAME: '進行中',
  APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbzer6_31xJ-g66MNSeKc9IX3pvcIdJQcrFZb97ho18q7DN0FwUHsiFUUxEYi9u1kUDmpQ/exec',
  WARN_DAYS: 3 // days before deadline to show yellow warning
};

const DEFAULT_STAGES=['未開始','規劃中','設計中','開發中','測試中','送審中','修正中','待上線','已完成'];
const DEFAULT_COLORS={'未開始':'#9ca3af','規劃中':'#eab308','設計中':'#3b82f6','開發中':'#10b981','測試中':'#8b5cf6','送審中':'#f97316','修正中':'#ef4444','待上線':'#06b6d4','已完成':'#22c55e'};
let STAGES=[...DEFAULT_STAGES];
let STAGE_COLORS={...DEFAULT_COLORS};

const DEMO_DATA=[
  {row:2,machine:'龍之谷 v2.0',stage:'規劃中',planStart:'2026-05-19',planEnd:'2026-06-01',actualStart:'2026-05-19',actualEnd:'2026-06-03',owner:'阿凱',note:'延遲 2 天',priority:'高'},
  {row:3,machine:'龍之谷 v2.0',stage:'設計中',planStart:'2026-06-02',planEnd:'2026-06-22',actualStart:'2026-06-04',actualEnd:'2026-06-20',owner:'阿凱',note:'',priority:'高'},
  {row:4,machine:'龍之谷 v2.0',stage:'開發中',planStart:'2026-06-23',planEnd:'2026-08-03',actualStart:'2026-06-23',actualEnd:'',owner:'阿凱',note:'進行中',priority:'高'},
  {row:5,machine:'龍之谷 v2.0',stage:'測試中',planStart:'',planEnd:'2026-08-17',actualStart:'',actualEnd:'',owner:'阿凱',note:'Deadline',priority:'高'},
  {row:6,machine:'龍之谷 v2.0',stage:'送審中',planStart:'',planEnd:'2026-09-07',actualStart:'',actualEnd:'',owner:'阿凱',note:'Deadline',priority:'高'},
  {row:7,machine:'麻將至尊',stage:'設計中',planStart:'2026-05-05',planEnd:'2026-05-25',actualStart:'2026-05-05',actualEnd:'2026-05-23',owner:'小美',note:'提前完成',priority:'中'},
  {row:8,machine:'麻將至尊',stage:'開發中',planStart:'2026-05-26',planEnd:'2026-07-06',actualStart:'2026-05-26',actualEnd:'2026-07-10',owner:'小美',note:'延遲',priority:'中'},
  {row:9,machine:'麻將至尊',stage:'測試中',planStart:'2026-07-07',planEnd:'2026-07-27',actualStart:'2026-07-11',actualEnd:'',owner:'小美',note:'進行中',priority:'中'},
  {row:10,machine:'麻將至尊',stage:'送審中',planStart:'2026-07-28',planEnd:'2026-08-17',actualStart:'',actualEnd:'',owner:'小美',note:'',priority:'中'},
  {row:11,machine:'水果盤 Deluxe',stage:'規劃中',planStart:'2026-06-16',planEnd:'2026-06-29',actualStart:'2026-06-23',actualEnd:'',owner:'志明',note:'晚一週',priority:'低'},
  {row:12,machine:'水果盤 Deluxe',stage:'設計中',planStart:'',planEnd:'2026-07-20',actualStart:'',actualEnd:'',owner:'志明',note:'Deadline',priority:'低'},
  {row:13,machine:'水果盤 Deluxe',stage:'開發中',planStart:'2026-07-21',planEnd:'2026-09-07',actualStart:'',actualEnd:'',owner:'志明',note:'',priority:'低'},
];

let rawData=[];
const canEdit=()=>!!CONFIG.APPS_SCRIPT_URL;
const TODAY=new Date().toISOString().slice(0,10);

// === Utils ===
function normDate(s){
  if(!s)return '';s=String(s).trim();
  var m=s.match(/(\d{4})-(\d{2})-(\d{2})/);if(m)return m[1]+'-'+m[2]+'-'+m[3];
  m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);if(m)return m[3]+'-'+m[1].padStart(2,'0')+'-'+m[2].padStart(2,'0');
  var months={Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
  m=s.match(/\w+\s+(\w+)\s+(\d{1,2})\s+(\d{4})/);if(m&&months[m[1]])return m[3]+'-'+months[m[1]]+'-'+m[2].padStart(2,'0');
  return '';
}
function fmtDate(s){if(!s)return '—';var m=s.match(/(\d{4})-(\d{2})-(\d{2})/);return m?m[2]+'/'+m[3]:'—'}
function esc(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function diffDays(a,b){return Math.round((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000)}
function stageStatus(s){
  if(s.actualEnd)return 'green';
  if(!s.planEnd)return 'green';
  var daysLeft=diffDays(TODAY,s.planEnd);
  if(daysLeft<0)return 'red';
  if(daysLeft<=CONFIG.WARN_DAYS)return 'yellow';
  return 'green';
}

// === Data ===
function groupByMachine(data){const map=new Map();data.forEach(r=>{if(!map.has(r.machine))map.set(r.machine,[]);map.get(r.machine).push(r)});return map;}

function getMachineStatus(stages){
  const allDone=stages.every(s=>s.actualEnd);
  const anyStarted=stages.some(s=>s.actualStart);
  if(allDone)return 'done';
  if(anyStarted)return 'active';
  return 'pending';
}

function getWeightedProgress(stages){
  let totalDays=0,doneDays=0;
  stages.forEach(s=>{
    let days=1;
    if(s.planStart&&s.planEnd)days=Math.max(1,diffDays(s.planStart,s.planEnd));
    else if(s.actualStart&&s.actualEnd)days=Math.max(1,diffDays(s.actualStart,s.actualEnd));
    if(s.planStart||s.planEnd||s.actualStart||s.actualEnd){
      totalDays+=days;
      if(s.actualEnd)doneDays+=days;
    }
  });
  return totalDays?Math.round(doneDays/totalDays*100):0;
}

// === Load ===
async function loadData(){
  const loading=document.getElementById('loading'),err=document.getElementById('error-banner'),src=document.getElementById('source-note');
  if(!CONFIG.SHEET_ID){rawData=DEMO_DATA;src.textContent='Demo';finish();return}
  try{
    if(canEdit()){
      const r=await(await fetch(CONFIG.APPS_SCRIPT_URL+'?action=read',{redirect:'follow'})).json();
      if(r.success){
        if(r.stages&&r.stages.length>0){STAGES=r.stages.map(s=>s.name);STAGE_COLORS={};r.stages.forEach(s=>{STAGE_COLORS[s.name]=s.color})}
        rawData=r.data.map(d=>({...d,planStart:normDate(d.planStart),planEnd:normDate(d.planEnd),actualStart:normDate(d.actualStart),actualEnd:normDate(d.actualEnd)}));
        src.textContent='Google Sheet（即時）';finish();return;
      }
    }
    let text;try{const r=await fetch(gvizUrl('csv'));if(r.ok)text=await r.text()}catch(e){}
    if(text)rawData=parseCsv(text);else{const r=await fetch(gvizUrl('json'));rawData=parseGvizJson(await r.text())}
    src.textContent='Google Sheet（即時）';finish();
  }catch(e){err.textContent='讀取失敗：'+e.message;err.style.display='block';rawData=DEMO_DATA;src.textContent='Demo';finish()}
}
function gvizUrl(f){return`https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:${f}&sheet=${encodeURIComponent(CONFIG.SHEET_NAME)}`}
function parseCsv(text){const lines=text.split('\n').filter(l=>l.trim());const res=[];for(let i=1;i<lines.length;i++){const c=csvLine(lines[i]);if(c.length>=2)res.push({row:i+1,machine:c[0],stage:c[1],planStart:normDate(c[2]),planEnd:normDate(c[3]),actualStart:normDate(c[4]),actualEnd:normDate(c[5]),owner:c[6]||'',note:c[7]||'',priority:c[8]||''})}return res}
function csvLine(l){const r=[];let c='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(q){if(ch==='"'&&l[i+1]==='"'){c+='"';i++}else if(ch==='"')q=false;else c+=ch}else{if(ch==='"')q=true;else if(ch===','){r.push(c.trim());c=''}else c+=ch}}r.push(c.trim());return r}
function parseGvizJson(text){const m=text.match(/google\.visualization\.Query\.setResponse\(([\s\S]+)\);?\s*$/);const j=JSON.parse(m?m[1]:text);return j.table.rows.map((row,i)=>{const c=row.c||[];const v=idx=>{if(!c[idx]||c[idx].v==null)return '';const val=c[idx].v;if(typeof val==='string'&&val.startsWith('Date(')){const p=val.match(/Date\((\d+),(\d+),(\d+)\)/);if(p)return p[1]+'-'+String(Number(p[2])+1).padStart(2,'0')+'-'+p[3].padStart(2,'0')}return String(val)};return{row:i+2,machine:v(0),stage:v(1),planStart:normDate(v(2)),planEnd:normDate(v(3)),actualStart:normDate(v(4)),actualEnd:normDate(v(5)),owner:v(6),note:v(7),priority:v(8)}})}

function finish(){
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='';
  if(canEdit())document.querySelectorAll('.edit-only').forEach(el=>el.style.display='');
  populateFilters();render();
  document.getElementById('filter-status').onchange=render;
  document.getElementById('filter-owner').onchange=render;
  document.getElementById('filter-search').oninput=render;
}

function populateFilters(){
  const sel=document.getElementById('filter-owner');
  const owners=[...new Set(rawData.map(r=>r.owner).filter(Boolean))];
  sel.innerHTML='<option value="">全部負責人</option>'+owners.map(o=>`<option>${esc(o)}</option>`).join('');
}

// === Render ===
function render(){renderKPI();renderTable();renderGantt()}

function getFilteredMachines(){
  const status=document.getElementById('filter-status').value;
  const owner=document.getElementById('filter-owner').value;
  const search=document.getElementById('filter-search').value.toLowerCase();
  const machines=groupByMachine(rawData);
  const result=new Map();
  machines.forEach((stages,name)=>{
    const ms=getMachineStatus(stages);
    if(status==='active'&&ms==='done')return;
    if(status==='done'&&ms!=='done')return;
    if(owner&&!stages.some(s=>s.owner===owner))return;
    if(search&&!name.toLowerCase().includes(search))return;
    result.set(name,stages);
  });
  return result;
}

function renderKPI(){
  const machines=groupByMachine(rawData);let total=machines.size,done=0,active=0;
  machines.forEach(stages=>{const s=getMachineStatus(stages);if(s==='done')done++;else if(s==='active')active++});
  document.getElementById('kpis').innerHTML=`
    <div class="kpi"><div class="kpi-label">總機台數</div><div class="kpi-val">${total}</div></div>
    <div class="kpi"><div class="kpi-label">進行中</div><div class="kpi-val">${active}</div></div>
    <div class="kpi"><div class="kpi-label">已完成</div><div class="kpi-val">${done}</div></div>
    <div class="kpi"><div class="kpi-label">未開始</div><div class="kpi-val">${total-done-active}</div></div>`;
}

function renderTable(){
  const machines=getFilteredMachines();let html='';
  machines.forEach((stages,name)=>{
    const owner=stages[0]?.owner||'';
    const priority=stages[0]?.priority||'中';
    const pct=getWeightedProgress(stages);
    const currentStage=stages.find(s=>s.actualStart&&!s.actualEnd);
    const id='tbl-'+name.replace(/\W/g,'');
    const ms=getMachineStatus(stages);
    const pctColor=pct>=100?'#22c55e':'#6366f1';
    html+=`<div class="machine-group">
      <div class="machine-header" onclick="document.getElementById('${id}').classList.toggle('open')">
        <div><span class="machine-name">${esc(name)}</span> <span class="badge priority-${priority}">${priority}</span></div>
        <div class="machine-meta">
          <span>${esc(owner)}</span>
          ${currentStage?`<span class="badge" style="background:${STAGE_COLORS[currentStage.stage]||'#ddd'}22;color:${STAGE_COLORS[currentStage.stage]||'#666'}">${esc(currentStage.stage)}</span>`:(ms==='done'?'<span class="badge badge-green">完成</span>':'<span class="badge priority-低">未開始</span>')}
          <span>${pct}%</span>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${pctColor}"></div></div>
          ${canEdit()?`<div class="machine-actions">
            <button class="btn btn-sm btn-add-stage" onclick="event.stopPropagation();openAddStage('${esc(name)}','${esc(owner)}')">+階段</button>
            ${ms!=='done'?`<button class="btn btn-sm btn-edit" onclick="event.stopPropagation();archiveMach('${esc(name)}')">歸檔</button>`:''}
            <button class="btn btn-sm btn-delete" onclick="event.stopPropagation();delMachine('${esc(name)}')">✕</button>
          </div>`:''}</div>
      </div>
      <table class="stage-table" id="${id}">
        <thead><tr><th>階段</th><th>狀態</th><th>計畫開始</th><th>計畫結束</th><th>實際開始</th><th>實際結束</th><th>備註</th>${canEdit()?'<th>操作</th>':''}</tr></thead>
        <tbody>${stages.map(s=>{const st=stageStatus(s);return`<tr>
          <td><span class="badge" style="background:${STAGE_COLORS[s.stage]||'#ddd'}22;color:${STAGE_COLORS[s.stage]||'#666'}">${esc(s.stage)}</span></td>
          <td><span class="badge badge-${st}">${st==='green'?'✓':st==='yellow'?'⚠':'✗'}</span></td>
          <td>${fmtDate(s.planStart)}</td><td>${fmtDate(s.planEnd)}</td>
          <td>${fmtDate(s.actualStart)}</td><td>${fmtDate(s.actualEnd)}</td><td>${esc(s.note)}</td>
          ${canEdit()?`<td style="white-space:nowrap"><button class="btn btn-sm btn-edit" onclick="openEditStage(${s.row||0},'${esc(name)}','${esc(s.stage)}','${s.planStart}','${s.planEnd}','${s.actualStart}','${s.actualEnd}','${esc(s.owner)}','${esc(s.note)}','${esc(s.priority)}')">✎</button> <button class="btn btn-sm btn-delete" onclick="delStage(${s.row||0})">✕</button></td>`:''}</tr>`}).join('')}</tbody>
      </table></div>`;
  });
  document.getElementById('table-area').innerHTML=html||'<p style="color:#888;text-align:center;padding:20px">無符合條件的機台</p>';
}

// === Gantt ===
function renderGantt(){
  const machines=getFilteredMachines();
  const weeks=getWeeks(),total=weeks.length;
  let html=`<div class="gantt-hdr"><div class="gantt-lbl">機台 / 階段</div><div class="gantt-timeline">`;
  weeks.forEach(w=>{html+=`<div class="gantt-wk">${String(w.getMonth()+1).padStart(2,'0')}/${String(w.getDate()).padStart(2,'0')}</div>`});
  html+=`</div></div>`;

  machines.forEach((stages,name)=>{
    html+=`<div class="gantt-group-label">${esc(name)}</div>`;
    stages.forEach(s=>{
      html+=`<div class="gantt-row"><div class="gantt-row-lbl" title="${esc(s.stage)}">${esc(s.stage)}</div><div class="gantt-row-tl">`;
      weeks.forEach(()=>{html+=`<div class="gantt-cell"></div>`});
      const color=STAGE_COLORS[s.stage]||'#6366f1';
      if(s.planStart&&s.planEnd){const l=datePos(weeks,s.planStart)*100,r=datePos(weeks,s.planEnd)*100;html+=`<div class="g-plan" style="left:${l}%;width:${Math.max(r-l,.5)}%;background:${color}"></div>`}
      else if(s.planEnd&&!s.planStart){const p=datePos(weeks,s.planEnd)*100;html+=`<div class="g-milestone" style="left:calc(${p}% - 6px);border-color:${color}"></div>`}
      if(s.actualStart){const l=datePos(weeks,s.actualStart)*100,r=(s.actualEnd?datePos(weeks,s.actualEnd):datePos(weeks,TODAY))*100;html+=`<div class="g-actual" style="left:${l}%;width:${Math.max(r-l,.5)}%;background:${color}"></div>`}
      html+=`</div></div>`;
    });
  });

  // Today line
  const todayPos=datePos(weeks,TODAY)*100;
  if(todayPos>0&&todayPos<100){
    html+=`<div class="today-line" style="left:calc(180px + ${todayPos}% * (100% - 180px) / 100)"><div class="today-label">Today</div></div>`;
  }

  document.getElementById('gantt').innerHTML=html;

  // Today line positioning via JS for accuracy
  const ganttEl=document.getElementById('gantt');
  const hdr=ganttEl.querySelector('.gantt-hdr');
  if(hdr&&todayPos>0&&todayPos<100){
    const tlEl=hdr.querySelector('.gantt-timeline');
    if(tlEl){
      const line=document.createElement('div');
      line.className='today-line';
      line.style.left=(180+tlEl.offsetWidth*todayPos/100)+'px';
      line.innerHTML='<div class="today-label">Today</div>';
      ganttEl.appendChild(line);
    }
  }
  // Remove the inline one
  const inlineLine=ganttEl.querySelector('.today-line:not([style*="px"])');
  if(inlineLine)inlineLine.remove();
}

function getWeeks(){
  let min=Infinity,max=-Infinity;
  rawData.forEach(r=>{[r.planStart,r.planEnd,r.actualStart,r.actualEnd].forEach(d=>{if(d){const t=new Date(d+'T00:00:00').getTime();if(t<min)min=t;if(t>max)max=t}})});
  if(min===Infinity){min=Date.now();max=Date.now()+86400000*90}
  const s=mondayOf(new Date(min-86400000*7)),e=new Date(max+86400000*14),weeks=[];
  const c=new Date(s);while(c<=e){weeks.push(new Date(c));c.setDate(c.getDate()+7)}return weeks;
}
function mondayOf(d){const r=new Date(d.getFullYear(),d.getMonth(),d.getDate());const day=r.getDay();r.setDate(r.getDate()-((day+6)%7));return r}
function datePos(weeks,dateStr){
  const total=weeks.length;
  const d=new Date(dateStr.slice(0,10)+'T00:00:00');
  const start=weeks[0].getTime();
  const end=weeks[total-1].getTime()+7*86400000;
  return Math.max(0,Math.min(1,(d.getTime()-start)/(end-start)));
}

// === API ===
async function apiPost(body){
  try{const params=encodeURIComponent(JSON.stringify(body));const r=await fetch(CONFIG.APPS_SCRIPT_URL+'?payload='+params,{redirect:'follow'});return await r.json()}
  catch(e){alert('操作失敗：'+e.message);return{success:false}}
}

// === Modals ===
function openModal(html){document.getElementById('modal-content').innerHTML=html;document.getElementById('modal-bg').classList.add('active')}
function closeModal(){document.getElementById('modal-bg').classList.remove('active')}

function openAddMachine(){
  openModal(`<h3>新增機台</h3>
    <div class="fg"><label>機台名稱</label><input id="m-name"></div>
    <div class="fg"><label>負責人</label><input id="m-owner"></div>
    <div class="fg"><label>優先級</label><select id="m-priority"><option>低</option><option selected>中</option><option>高</option></select></div>
    <div class="modal-btns"><button class="btn btn-cancel" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="submitAddMachine()">確認</button></div>`);
}
async function submitAddMachine(){const name=document.getElementById('m-name').value,owner=document.getElementById('m-owner').value,priority=document.getElementById('m-priority').value;if(!name){alert('請輸入名稱');return}closeModal();await apiPost({action:'addMachine',name,owner,priority});await loadData()}

function openAddStage(machine,owner){
  const opts=STAGES.map(s=>`<option>${esc(s)}</option>`).join('');
  openModal(`<h3>新增階段 — ${machine}</h3>
    <div class="fg"><label>階段</label><select id="s-stage">${opts}</select></div>
    <div class="fg"><label>計畫開始日</label><input type="date" id="s-ps"></div>
    <div class="fg"><label>計畫結束日</label><input type="date" id="s-pe"></div>
    <div class="fg"><label>備註</label><textarea id="s-note"></textarea></div>
    <div class="modal-btns"><button class="btn btn-cancel" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="submitAddStage('${esc(machine)}','${esc(owner)}')">確認</button></div>`);
}
async function submitAddStage(machine,owner){const data={machine,stage:document.getElementById('s-stage').value,planStart:document.getElementById('s-ps').value,planEnd:document.getElementById('s-pe').value,actualStart:'',actualEnd:'',owner,note:document.getElementById('s-note').value,priority:''};closeModal();await apiPost({action:'addStage',data});await loadData()}

function openEditStage(row,machine,stage,ps,pe,as,ae,owner,note,priority){
  const opts=STAGES.map(s=>`<option${s===stage?' selected':''}>${esc(s)}</option>`).join('');
  openModal(`<h3>編輯階段</h3>
    <div class="fg"><label>階段</label><select id="e-stage">${opts}</select></div>
    <div class="fg"><label>計畫開始日</label><input type="date" id="e-ps" value="${ps}"></div>
    <div class="fg"><label>計畫結束日</label><input type="date" id="e-pe" value="${pe}"></div>
    <div class="fg"><label>實際開始日</label><input type="date" id="e-as" value="${as}"></div>
    <div class="fg"><label>實際結束日</label><input type="date" id="e-ae" value="${ae}"></div>
    <div class="fg"><label>備註</label><textarea id="e-note">${esc(note)}</textarea></div>
    <div class="modal-btns"><button class="btn btn-cancel" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="submitEditStage(${row},'${esc(machine)}','${esc(owner)}','${esc(priority)}')">確認</button></div>`);
}
async function submitEditStage(row,machine,owner,priority){const data={machine,stage:document.getElementById('e-stage').value,planStart:document.getElementById('e-ps').value,planEnd:document.getElementById('e-pe').value,actualStart:document.getElementById('e-as').value,actualEnd:document.getElementById('e-ae').value,owner,note:document.getElementById('e-note').value,priority};closeModal();await apiPost({action:'update',row,data});await loadData()}

async function delStage(row){if(!confirm('確定刪除此階段？'))return;await apiPost({action:'delete',row});await loadData()}
async function delMachine(name){if(!confirm('確定刪除「'+name+'」的所有階段？'))return;await apiPost({action:'deleteMachine',machineName:name});await loadData()}
async function archiveMach(name){if(!confirm('確定歸檔「'+name+'」？'))return;await apiPost({action:'archiveMachine',machineName:name});await loadData()}

// === Settings ===
function openSettings(){
  let items=STAGES.map((s,i)=>`<li class="settings-item" data-idx="${i}">
    <input type="color" value="${STAGE_COLORS[s]||'#9ca3af'}" data-field="color">
    <input type="text" value="${esc(s)}" data-field="name">
    <button class="btn btn-sm btn-edit" onclick="moveStage(${i},-1)">↑</button>
    <button class="btn btn-sm btn-edit" onclick="moveStage(${i},1)">↓</button>
    <button class="btn btn-sm btn-delete" onclick="removeStageItem(${i})">✕</button>
  </li>`).join('');
  openModal(`<h3>階段設定</h3>
    <ul class="settings-list" id="settings-list">${items}</ul>
    <div style="margin-top:12px;display:flex;gap:8px">
      <input type="color" id="new-stage-color" value="#6366f1" style="width:40px;height:32px;border:none;border-radius:4px">
      <input type="text" id="new-stage-name" placeholder="新階段名稱" style="flex:1;padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px">
      <button class="btn btn-add-stage" onclick="addStageItem()">新增</button>
    </div>
    <div class="modal-btns"><button class="btn btn-cancel" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveSettings()">儲存</button></div>`);
}
function addStageItem(){const n=document.getElementById('new-stage-name').value.trim(),c=document.getElementById('new-stage-color').value;if(!n){alert('請輸入名稱');return}STAGES.push(n);STAGE_COLORS[n]=c;openSettings()}
function removeStageItem(i){STAGES.splice(i,1);openSettings()}
function moveStage(i,dir){const j=i+dir;if(j<0||j>=STAGES.length)return;[STAGES[i],STAGES[j]]=[STAGES[j],STAGES[i]];openSettings()}
async function saveSettings(){
  const items=document.querySelectorAll('#settings-list .settings-item');
  const stages=[];items.forEach(li=>{const n=li.querySelector('[data-field=name]').value.trim(),c=li.querySelector('[data-field=color]').value;if(n)stages.push({name:n,color:c})});
  STAGES=stages.map(s=>s.name);STAGE_COLORS={};stages.forEach(s=>{STAGE_COLORS[s.name]=s.color});
  closeModal();await apiPost({action:'setStages',stages});render();
}

// === Init ===
document.getElementById('gen-time').textContent=new Date().toISOString().slice(0,16).replace('T',' ');
loadData();
</script>
