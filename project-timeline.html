// === Utils ===
function normDate(s){
  if(!s)return '';s=String(s).trim();
  var m=s.match(/(\d{4})-(\d{2})-(\d{2})/);if(m)return m[1]+'-'+m[2]+'-'+m[3];
  m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);if(m)return m[3]+'-'+m[1].padStart(2,'0')+'-'+m[2].padStart(2,'0');
  var months={Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
  m=s.match(/\w+\s+(\w+)\s+(\d{1,2})\s+(\d{4})/);if(m&&months[m[1]])return m[3]+'-'+months[m[1]]+'-'+m[2].padStart(2,'0');
  return '';
}
function fmtDate(s){if(!s)return '—';var m=s.match(/(\d{4})-(\d{2})-(\d{2})/);return m?m[2]+'/'+m[3]:'—'}
function esc(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function diffDays(a,b){return Math.round((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000)}
function stageStatus(s){
  if(s.actualEnd)return 'green';
  if(!s.planEnd)return 'green';
  var daysLeft=diffDays(TODAY,s.planEnd);
  if(daysLeft<0)return 'red';
  if(daysLeft<=CONFIG.WARN_DAYS)return 'yellow';
  return 'green';
}

// === Data ===
function groupByMachine(data){const map=new Map();data.forEach(r=>{if(!map.has(r.machine))map.set(r.machine,[]);map.get(r.machine).push(r)});return map;}

function getMachineStatus(stages){
  const allDone=stages.every(s=>s.actualEnd);
  const anyStarted=stages.some(s=>s.actualStart);
  if(allDone)return 'done';
  if(anyStarted)return 'active';
  return 'pending';
}

function getWeightedProgress(stages){
  let totalDays=0,doneDays=0;
  stages.forEach(s=>{
    let days=1;
    if(s.planStart&&s.planEnd)days=Math.max(1,diffDays(s.planStart,s.planEnd));
    else if(s.actualStart&&s.actualEnd)days=Math.max(1,diffDays(s.actualStart,s.actualEnd));
    if(s.planStart||s.planEnd||s.actualStart||s.actualEnd){
      totalDays+=days;
      if(s.actualEnd)doneDays+=days;
    }
  });
  return totalDays?Math.round(doneDays/totalDays*100):0;
}

async function loadData(){
  const loading=document.getElementById('loading'),err=document.getElementById('error-banner'),src=document.getElementById('source-note');
  if(!CONFIG.SHEET_ID){rawData=DEMO_DATA;src.textContent='Demo';finish();return}

      const r=await(await fetch(CONFIG.APPS_SCRIPT_URL+'?action=read',{redirect:'follow'})).json();

        rawData=(r.data||[]).map(d=>({row:d.row||0,machine:d.machine||'',stage:d.stage||'',planStart:normDate(d.planStart),planEnd:normDate(d.planEnd),actualStart:normDate(d.actualStart),actualEnd:normDate(d.actualEnd),owner:d.owner||'',note:d.note||'',priority:d.priority||'',type:d.type||'工作階段'}));
        src.textContent='Google Sheet（即時）';finish();return;
      }
    }
    let text;try{const r=await fetch(gvizUrl('csv'));if(r.ok)text=await r.text()}catch(e){}
    if(text)rawData=parseCsv(text);else{const r=await fetch(gvizUrl('json'));rawData=parseGvizJson(await r.text())}
    src.textContent='Google Sheet（即時）';finish();
  }catch(e){err.textContent='讀取失敗：'+(e.message||e);err.style.display='block';rawData=DEMO_DATA;src.textContent='Demo';finish()}
}
function gvizUrl(f){return`https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:${f}&sheet=${encodeURIComponent(CONFIG.SHEET_NAME)}`}
function parseCsv(text){const lines=text.split('\n').filter(l=>l.trim());const res=[];for(let i=1;i<lines.length;i++){const c=csvLine(lines[i]);if(c.length>=2)res.push({row:i+1,machine:c[0],stage:c[1],planStart:normDate(c[2]),planEnd:normDate(c[3]),actualStart:normDate(c[4]),actualEnd:normDate(c[5]),owner:c[6]||'',note:c[7]||'',priority:c[8]||'',type:c[9]||'工作階段'})}return res}
function csvLine(l){const r=[];let c='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(q){if(ch==='"'&&l[i+1]==='"'){c+='"';i++}else if(ch==='"')q=false;else c+=ch}else{if(ch==='"')q=true;else if(ch===','){r.push(c.trim());c=''}else c+=ch}}r.push(c.trim());return r}
function parseGvizJson(text){const m=text.match(/google\.visualization\.Query\.setResponse\(([\s\S]+)\);?\s*$/);const j=JSON.parse(m?m[1]:text);return j.table.rows.map((row,i)=>{const c=row.c||[];const v=idx=>{if(!c[idx]||c[idx].v==null)return '';const val=c[idx].v;if(typeof val==='string'&&val.startsWith('Date(')){const p=val.match(/Date\((\d+),(\d+),(\d+)\)/);if(p)return p[1]+'-'+String(Number(p[2])+1).padStart(2,'0')+'-'+p[3].padStart(2,'0')}return String(val)};return{row:i+2,machine:v(0),stage:v(1),planStart:normDate(v(2)),planEnd:normDate(v(3)),actualStart:normDate(v(4)),actualEnd:normDate(v(5)),owner:v(6),note:v(7),priority:v(8),type:v(9)||'工作階段'}})}

function render(){renderKPI();renderTable();renderGantt()}

function getFilteredMachines(){
  const status=document.getElementById('filter-status').value;
  const owner=document.getElementById('filter-owner').value;
  const search=document.getElementById('filter-search').value.toLowerCase();
  const machines=groupByMachine(rawData);
  const filtered=[];
  machines.forEach((stages,name)=>{
    const ms=getMachineStatus(stages);
    if(status==='active'&&ms==='done')return;
    if(status==='done'&&ms!=='done')return;
    if(owner&&!stages.some(s=>s.owner===owner))return;
    if(search&&!name.toLowerCase().includes(search))return;
    filtered.push([name,stages]);
  });
  filtered.sort((a,b)=>{return(getLaunchDate(a[1])||'9999')>(getLaunchDate(b[1])||'9999')?1:-1});
  const result=new Map();
  filtered.forEach(([n,s])=>result.set(n,s));
  return result;
}
function getLaunchDate(stages){
  const launch=stages.find(s=>s.type==='里程碑'&&(/上線/.test(s.stage)));
  if(launch&&launch.planEnd)return launch.planEnd;
  let latest='';
  stages.forEach(s=>{if(s.planEnd&&s.planEnd>latest)latest=s.planEnd});
  return latest||null;
}

  document.getElementById('kpis').innerHTML=`
    <div class="kpi"><div class="kpi-label">總機台數</div><div class="kpi-val">${total}</div></div>

    <div class="kpi"><div class="kpi-label">未開始</div><div class="kpi-val">${total-done-active}</div></div>`;
}

// === Gantt ===
let ganttView=lsGet('ganttView')||'milestone';
function setGanttView(v){ganttView=v;lsSet('ganttView',v);renderGantt()}

function renderGantt(){
  document.getElementById('btn-milestone').className='btn btn-sm'+(ganttView==='milestone'?' active':'');
  document.getElementById('btn-detail').className='btn btn-sm'+(ganttView==='detail'?' active':'');
  const machines=getFilteredMachines();
  const weeks=getWeeks(),total=weeks.length;
  let html=`<div class="gantt-hdr"><div class="gantt-lbl">機台${ganttView==='detail'?' / 階段':''}</div><div class="gantt-timeline">`;
  weeks.forEach(w=>{html+=`<div class="gantt-wk">${String(w.getMonth()+1).padStart(2,'0')}/${String(w.getDate()).padStart(2,'0')}</div>`});
  html+=`</div></div>`;

  if(ganttView==='milestone') html+=renderGanttMilestone(machines,weeks,total);
  else html+=renderGanttDetail(machines,weeks,total);

  document.getElementById('gantt').innerHTML=html;
  addTodayLine(weeks);
}

function renderGanttMilestone(machines,weeks,total){
  let html='';
  machines.forEach((stages,name)=>{
    const milestones=stages.filter(s=>s.type==='里程碑');
    // Find overall span from all stages
    let minD=null,maxD=null;
    stages.forEach(s=>{[s.planStart,s.planEnd,s.actualStart,s.actualEnd].forEach(d=>{if(d){if(!minD||d<minD)minD=d;if(!maxD||d>maxD)maxD=d}})});
    html+=`<div class="gantt-row"><div class="gantt-row-lbl" title="${esc(name)}">${esc(name)}</div><div class="gantt-row-tl">`;
    weeks.forEach(()=>{html+=`<div class="gantt-cell"></div>`});
    if(minD&&maxD){const l=datePos(weeks,minD)*100,r=datePos(weeks,maxD)*100;html+=`<div class="g-bar" style="left:${l}%;width:${Math.max(r-l,.5)}%;background:#6366f1"></div><span style="position:absolute;top:0;left:${l}%;font-size:8px;color:#999;transform:translateX(-50%)">${fmtDate(minD)}</span><span style="position:absolute;top:0;left:${r}%;font-size:8px;color:#999;transform:translateX(-50%)">${fmtDate(maxD)}</span>`}
    // Only show milestone-type items
    milestones.forEach(s=>{
      const dt=s.planEnd||s.actualEnd||s.planStart;
      if(!dt)return;
      const pos=datePos(weeks,dt)*100;
      const st=stageStatus(s);
      html+=`<div class="g-dot g-dot-${st}" style="left:${pos}%"><div class="g-tooltip">${esc(s.stage)} ${fmtDate(dt)} ${st==='green'?'✓':st==='yellow'?'⚠':'✗'}</div><span style="position:absolute;top:18px;left:50%;transform:translateX(-50%);font-size:10px;color:#333;white-space:nowrap;font-weight:500">${esc(s.stage)}<br>${fmtDate(dt)}</span></div>`;
    });
    html+=`</div></div>`;
  });
  return html;
}

function renderGanttDetail(machines,weeks,total){
  let html='';
  machines.forEach((stages,name)=>{
    html+=`<div class="gantt-group-label">${esc(name)}</div>`;
    stages.forEach(s=>{
      html+=`<div class="gantt-row"><div class="gantt-row-lbl" title="${esc(s.stage)}">${esc(s.stage)}</div><div class="gantt-row-tl">`;
      weeks.forEach(()=>{html+=`<div class="gantt-cell"></div>`});
      const color=STAGE_COLORS[s.stage]||'#6366f1';
      if(s.planStart&&s.planEnd){const l=datePos(weeks,s.planStart)*100,r=datePos(weeks,s.planEnd)*100;html+=`<div class="g-plan" style="left:${l}%;width:${Math.max(r-l,.5)}%;background:${color}"></div>`}
      else if(s.planEnd&&!s.planStart){const p=datePos(weeks,s.planEnd)*100;html+=`<div class="g-milestone" style="left:calc(${p}% - 6px);border-color:${color}"></div>`}
      if(s.actualStart){const l=datePos(weeks,s.actualStart)*100,r=(s.actualEnd?datePos(weeks,s.actualEnd):datePos(weeks,TODAY))*100;html+=`<div class="g-actual" style="left:${l}%;width:${Math.max(r-l,.5)}%;background:${color}"></div>`}
      html+=`</div></div>`;
    });
  });
  return html;
}

function addTodayLine(weeks){
  const todayPos=datePos(weeks,TODAY)*100;
  if(todayPos<=0||todayPos>=100)return;
  const ganttEl=document.getElementById('gantt');
  const hdr=ganttEl.querySelector('.gantt-hdr');
  if(!hdr)return;
  const tlEl=hdr.querySelector('.gantt-timeline');
  if(!tlEl)return;
  const line=document.createElement('div');
  line.className='today-line';
  line.style.left=(180+tlEl.offsetWidth*todayPos/100)+'px';
  line.innerHTML='<div class="today-label">Today</div>';
  ganttEl.appendChild(line);
}

function getWeeks(){
  let min=Infinity,max=-Infinity;
  rawData.forEach(r=>{[r.planStart,r.planEnd,r.actualStart,r.actualEnd].forEach(d=>{if(d){const t=new Date(d+'T00:00:00').getTime();if(t<min)min=t;if(t>max)max=t}})});
  if(min===Infinity){min=Date.now();max=Date.now()+86400000*90}
  const s=mondayOf(new Date(min-86400000*7)),e=new Date(max+86400000*14),weeks=[];
  const c=new Date(s);while(c<=e){weeks.push(new Date(c));c.setDate(c.getDate()+7)}return weeks;
}
function mondayOf(d){const r=new Date(d.getFullYear(),d.getMonth(),d.getDate());const day=r.getDay();r.setDate(r.getDate()-((day+6)%7));return r}
function datePos(weeks,dateStr){
  const total=weeks.length;
  const d=new Date(dateStr.slice(0,10)+'T00:00:00');
  const start=weeks[0].getTime();
  const end=weeks[total-1].getTime()+7*86400000;
  return Math.max(0,Math.min(1,(d.getTime()-start)/(end-start)));
}

      <button class="btn btn-sm btn-edit" onclick="moveStageInType('${type}',${i},-1)">↑</button>
      <button class="btn btn-sm btn-edit" onclick="moveStageInType('${type}',${i},1)">↓</button>
      <button class="btn btn-sm btn-delete" onclick="removeStageByName('${esc(s)}')">✕</button>

    <ul class="settings-list" id="settings-ws">${renderList(wsItems,'工作階段')}</ul>
    <div style="margin:8px 0;display:flex;gap:8px">
      <input type="color" id="new-ws-color" value="#6366f1" style="width:32px;height:28px;border:none;border-radius:4px">

function addStageTyped(type){
  const prefix=type==='里程碑'?'ms':'ws';
  const n=document.getElementById('new-'+prefix+'-name').value.trim(),c=document.getElementById('new-'+prefix+'-color').value;
  if(!n){alert('請輸入名稱');return}
  STAGES.push(n);STAGE_COLORS[n]=c;STAGE_TYPES[n]=type;openSettings();
}
function removeStageByName(name){const i=STAGES.indexOf(name);if(i>=0)STAGES.splice(i,1);openSettings()}
function moveStageInType(type,localIdx,dir){
  const items=stagesOfType(type);
  const j=localIdx+dir;if(j<0||j>=items.length)return;
  const gi1=STAGES.indexOf(items[localIdx]),gi2=STAGES.indexOf(items[j]);
  [STAGES[gi1],STAGES[gi2]]=[STAGES[gi2],STAGES[gi1]];
  openSettings();
}
async function saveSettings(){
  const stages=[];
  document.querySelectorAll('#settings-ms .settings-item, #settings-ws .settings-item').forEach(li=>{
    const n=li.querySelector('[data-field=name]').value.trim(),c=li.querySelector('[data-field=color]').value,t=li.dataset.type;
    if(n)stages.push({name:n,color:c,type:t});
  });
  STAGES=stages.map(s=>s.name);STAGE_COLORS={};STAGE_TYPES={};
  stages.forEach(s=>{STAGE_COLORS[s.name]=s.color;STAGE_TYPES[s.name]=s.type});
  closeModal();await apiPost({action:'setStages',stages});render();
}

];
let abData=[];

async function loadABData(){
  if(canEdit()){
    try{
      const r=await(await fetch(CONFIG.APPS_SCRIPT_URL+'?action=readAB',{redirect:'follow'})).json();
      if(r.success&&r.data&&r.data.length>0){
        // Group flat rows by game name
        const map=new Map();
        r.data.forEach(row=>{
          if(!map.has(row.game)){map.set(row.game,{gameName:row.game,gameTag:row.tag||'',targetMarket:row.market||'',launchDate:normDate(row.launchDate)||'',status:'打磨中',versions:[]})}
          const g=map.get(row.game);
          if(row.version){g.versions.push({label:row.version,date:normDate(row.versionDate)||'',winner:!!row.winner,running:!!row.running,row:row.row})}
          if(row.launchDate&&!g.launchDate)g.launchDate=normDate(row.launchDate);
        });
        map.forEach(g=>{if(g.versions.some(v=>v.winner))g.status='已定版'});
        abData=[...map.values()];return;
      }
    }catch(e){}
  }
  abData=AB_DEMO_DATA;
}

function getFilteredAB(){
  const status=document.getElementById('ab-filter-status').value;
  const search=document.getElementById('ab-filter-search').value.toLowerCase();
  const monthEl=document.getElementById('ab-filter-month');
  const month=monthEl?monthEl.value:'';
  return abData.filter(g=>{
    if(status!=='all'&&g.status!==status)return false;
    if(month&&(g.launchDate||'').slice(0,7)!==month)return false;
    if(search&&!g.gameName.toLowerCase().includes(search))return false;
    return true;
  });
}
function populateABMonths(){
  const sel=document.getElementById('ab-filter-month');if(!sel)return;
  const cur=sel.value;
  const months=[...new Set(abData.map(g=>(g.launchDate||'').slice(0,7)).filter(Boolean))].sort();
  sel.innerHTML='<option value="">全部上線月份</option>'+months.map(m=>`<option value="${m}">${m.replace('-','/')} 上線</option>`).join('');
  if(cur&&months.indexOf(cur)>=0)sel.value=cur;
}

function renderAB(){populateABMonths();renderABKPI();renderABTable();renderABTimeline()}

function renderABKPI(){

function renderABTable(){
  const games=getFilteredAB();
  if(!games.length){document.getElementById('ab-table-area').innerHTML='<p style="color:#888;text-align:center;padding:20px">無符合條件的遊戲</p>';return}
  const colors=['#6366f1','#10b981','#f97316','#ef4444','#8b5cf6','#3b82f6','#eab308','#ec4899'];
  let html=`<table class="ab-table"><thead><tr><th>遊戲名稱</th><th>Tag</th><th>市場</th><th>上線日</th><th>狀態</th><th>版本</th>${canEdit()?'<th>操作</th>':''}</tr></thead><tbody>`;
  games.forEach((g,gi)=>{
    html+=`<tr><td style="font-weight:600">${esc(g.gameName)}</td><td>${esc(g.gameTag)}</td><td>${esc(g.targetMarket)}</td><td>${fmtDate(g.launchDate)}</td>
      <td><span class="ab-status-badge ab-status-${g.status}">${g.status}</span></td><td>`;
    g.versions.forEach((v,vi)=>{
      const running=!!v.running;
      const style=running?'background:#fff3cd;color:#b8860b;border:1px solid #eab308':'background:#fff;color:#555;border:1px solid #ddd';
      const tip=v.label+'版 '+fmtDate(v.date)+(running?' ·測試中':'')+(v.winner?' 🏆':'');
      html+=`<span class="ab-version${v.winner?' winner':''}" style="${style}" title="${esc(tip)}">${v.label} ${fmtDate(v.date)}${v.winner?' 🏆':''}</span>`;
    });
    html+=`</td>`;

    html+=`</tr>`;

function renderABTimeline(){
  const games=getFilteredAB();
  if(!games.length){document.getElementById('ab-timeline').innerHTML='';return}
  const colors=['#6366f1','#10b981','#f97316','#ef4444','#8b5cf6','#3b82f6','#eab308','#ec4899'];
  // Compute time range
  let minD=null,maxD=null;
  games.forEach(g=>g.versions.forEach(v=>{if(v.date){if(!minD||v.date<minD)minD=v.date;if(!maxD||v.date>maxD)maxD=v.date}}));
  if(!minD){document.getElementById('ab-timeline').innerHTML='';return}
  // Extend range by 7 days each side
  const startMs=new Date(minD+'T00:00:00').getTime()-7*86400000;
  const endMs=new Date(maxD+'T00:00:00').getTime()+14*86400000;
  const range=endMs-startMs;
  function pos(d){return((new Date(d+'T00:00:00').getTime()-startMs)/range)*100}
  // Week headers
  const weeks=[];let wk=new Date(startMs);wk.setDate(wk.getDate()-((wk.getDay()+6)%7));
  while(wk.getTime()<=endMs){weeks.push(new Date(wk));wk=new Date(wk.getTime()+7*86400000)}

  let html=`<div style="display:flex;border-bottom:2px solid #eee"><div style="width:160px;min-width:160px;padding:6px 10px;font-size:11px;color:#888">遊戲</div><div style="display:flex;flex:1">`;
  weeks.forEach(w=>{html+=`<div style="flex:1;text-align:center;padding:4px 2px;font-size:9px;color:#bbb;border-left:1px solid #f0f0f0">${String(w.getMonth()+1).padStart(2,'0')}/${String(w.getDate()).padStart(2,'0')}</div>`});
  html+=`</div></div>`;

  games.forEach(g=>{
    html+=`<div class="ab-timeline-row"><div class="ab-timeline-lbl" title="${esc(g.gameName)}">${esc(g.gameName)}</div><div class="ab-timeline-bar">`;
    // Connection line
    const dates=g.versions.filter(v=>v.date).map(v=>v.date).sort();
    if(dates.length>1){const l=pos(dates[0]),r=pos(dates[dates.length-1]);html+=`<div class="ab-connect" style="left:${l}%;width:${r-l}%"></div>`}
    // Dots
    g.versions.forEach((v,vi)=>{
      if(!v.date)return;
      const p=pos(v.date);
      const c=colors[vi%colors.length];
      html+=`<div class="ab-dot${v.winner?' winner':''}" style="left:${p}%;background:${c}"><div class="ab-dot-tip">${v.label}版 ${fmtDate(v.date)}${v.winner?' 🏆':''}</div>${v.label}</div>`;
    });
    html+=`</div></div>`;
  });

  // Today line
  const todayPos=pos(TODAY);
  if(todayPos>0&&todayPos<100){html+=`<div style="position:absolute;top:0;bottom:0;left:calc(160px + (100% - 160px)*${todayPos}/100);width:2px;background:#ef4444;opacity:.7;z-index:10;pointer-events:none"><div style="position:absolute;top:-16px;font-size:9px;color:#ef4444;transform:translateX(-50%);white-space:nowrap">Today</div></div>`}
  document.getElementById('ab-timeline').innerHTML=`<div style="position:relative">${html}</div>`;
}

async function submitEditABGame(gi){

  const winnerRadio=document.querySelector('input[name="ab-winner"]:checked');
  const winnerIdx=winnerRadio?parseInt(winnerRadio.value):-1;
  g.versions=[];
  vEls.forEach((el,i)=>{
    const lbl=el.querySelector('.abv-lbl');
    const dt=el.querySelector('.abv-dt');
    const run=el.querySelector('.abv-run');
    if(lbl&&dt)g.versions.push({label:lbl.value,date:dt.value,winner:i===winnerIdx,running:run?run.checked:false});
  });
  if(g.versions.some(v=>v.winner))g.status='已定版';
  closeModal();await saveABData();renderAB();

async function delABGame(gi){

async function saveABData(){
