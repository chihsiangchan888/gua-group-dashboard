<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>機率部門專案時程管理儀表板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8f9fa; color: #333; padding: 24px; line-height: 1.5; }
.dashboard-header { text-align: center; margin-bottom: 32px; }
.dashboard-title { font-size: 26px; color: #1a1a2e; font-weight: 700; }
.dashboard-subtitle { font-size: 13px; color: #888; margin-top: 6px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.metric-card { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 4px solid #6366f1; }
.metric-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
.metric-value { font-size: 28px; font-weight: 700; color: #1a1a2e; margin: 4px 0; }
.section { background: #fff; border-radius: 10px; padding: 24px; margin-top: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.section-title { font-size: 17px; color: #1a1a2e; margin-bottom: 16px; font-weight: 600; }
.filters { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.filters select { background: #fff; color: #333; border: 1px solid #ddd; border-radius: 6px; padding: 8px 12px; font-size: 14px; cursor: pointer; }
.filters select:focus { outline: none; border-color: #6366f1; }

/* Table - desktop */
.data-table { width: 100%; border-collapse: collapse; }
.data-table th { text-align: left; padding: 10px 12px; border-bottom: 2px solid #eee; color: #888; font-size: 12px; text-transform: uppercase; }
.data-table td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
.data-table tr:hover { background: #f8f5ff; }

/* Mobile card view */
.card-list { display: none; }
.project-card { background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.project-card-title { font-size: 15px; font-weight: 600; color: #1a1a2e; margin-bottom: 8px; }
.project-card-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; color: #555; }
.project-card-row span:first-child { color: #888; }

/* Stage badges */
.badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; white-space: nowrap; }
.stage-未開始 { background: #f1f1f1; color: #888; }
.stage-規劃中 { background: #fff3cd; color: #b8860b; }
.stage-設計中 { background: #e0f2fe; color: #0369a1; }
.stage-開發中 { background: #d1fae5; color: #047857; }
.stage-測試中 { background: #ede9fe; color: #6d28d9; }
.stage-送審中 { background: #ffedd5; color: #c2410c; }
.stage-修正中 { background: #fee2e2; color: #dc2626; }
.stage-待上線 { background: #cffafe; color: #0e7490; }
.stage-已完成 { background: #d1fae5; color: #15803d; border: 1px solid #86efac; }

/* Gantt */
.gantt-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.gantt { min-width: 750px; }
.gantt-header { display: flex; border-bottom: 2px solid #eee; }
.gantt-header-label { width: 140px; min-width: 140px; padding: 8px 10px; font-size: 12px; color: #888; text-transform: uppercase; }
.gantt-header-timeline { display: flex; flex: 1; }
.gantt-week { flex: 1; text-align: center; padding: 6px 2px; font-size: 10px; color: #aaa; border-left: 1px solid #f0f0f0; }
.gantt-row { display: flex; border-bottom: 1px solid #f5f5f5; align-items: center; min-height: 38px; }
.gantt-row:hover { background: #fafafa; }
.gantt-row-label { width: 140px; min-width: 140px; padding: 6px 10px; font-size: 13px; color: #444; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gantt-row-timeline { display: flex; flex: 1; position: relative; height: 38px; }
.gantt-cell { flex: 1; border-left: 1px solid #f8f8f8; }
.gantt-bar-planned { position: absolute; top: 6px; height: 12px; border-radius: 6px; }
.gantt-bar-actual { position: absolute; top: 22px; height: 10px; border-radius: 5px; opacity: 0.45; border: 2px dashed rgba(0,0,0,0.2); }
.legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 14px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #666; }
.legend-planned { width: 20px; height: 10px; border-radius: 5px; background: #6366f1; }
.legend-actual { width: 20px; height: 10px; border-radius: 5px; background: rgba(99,102,241,0.4); border: 2px dashed rgba(0,0,0,0.2); }
.footer { text-align: center; margin-top: 32px; padding-top: 16px; border-top: 1px solid #eee; font-size: 12px; color: #aaa; }

/* Responsive */
@media (max-width: 768px) {
  body { padding: 12px; }
  .dashboard-title { font-size: 20px; }
  .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .metric-card { padding: 14px; }
  .metric-value { font-size: 22px; }
  .section { padding: 16px; }
  .data-table-wrapper { display: none; }
  .card-list { display: block; }
  .gantt-header-label, .gantt-row-label { width: 100px; min-width: 100px; font-size: 11px; }
  .gantt-week { font-size: 9px; }
}
@media (max-width: 480px) {
  .grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .metric-card { padding: 12px; }
  .metric-value { font-size: 20px; }
  .filters { flex-direction: column; }
  .filters select { width: 100%; }
}
</style>
</head>
<body>

<div class="dashboard-header">
  <h1 class="dashboard-title">機率部門專案時程管理儀表板</h1>
  <p class="dashboard-subtitle">產生時間：2026-06-27 | 呱集團 機率部門</p>
</div>

<div class="grid" id="kpi-cards"></div>

<div class="section">
  <h2 class="section-title">專案總覽</h2>
  <div class="filters">
    <select id="filter-owner"><option value="">全部負責人</option></select>
    <select id="filter-stage"><option value="">全部階段</option></select>
  </div>
  <div class="data-table-wrapper">
    <table class="data-table">
      <thead>
        <tr><th>機台名稱</th><th>負責人</th><th>目前階段</th><th>預計開始</th><th>預計結束</th><th>實際開始</th><th>實際結束</th><th>備註</th></tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
  <div class="card-list" id="card-list"></div>
</div>

<div class="section">
  <h2 class="section-title">甘特圖 — 時間軸（週粒度）</h2>
  <div class="gantt-container">
    <div class="gantt" id="gantt-chart"></div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-planned"></div>預計時程</div>
    <div class="legend-item"><div class="legend-actual"></div>實際時程</div>
  </div>
</div>

<div class="footer">由 呱集團 AI Fleet 自動產生</div>

<script>
const STAGES = ['未開始','規劃中','設計中','開發中','測試中','送審中','修正中','待上線','已完成'];
const STAGE_COLORS = {
  '未開始':'#9ca3af','規劃中':'#eab308','設計中':'#3b82f6','開發中':'#10b981',
  '測試中':'#8b5cf6','送審中':'#f97316','修正中':'#ef4444','待上線':'#06b6d4','已完成':'#22c55e'
};

const projects = [
  { name:'龍之谷 v2.0', owner:'阿凱', stage:'開發中', planStart:'2026-06-02', planEnd:'2026-08-10', actualStart:'2026-06-02', actualEnd:'', note:'核心玩法重構' },
  { name:'麻將至尊', owner:'小美', stage:'測試中', planStart:'2026-05-12', planEnd:'2026-07-20', actualStart:'2026-05-12', actualEnd:'', note:'第二輪 QA 進行中' },
  { name:'水果盤 Deluxe', owner:'志明', stage:'設計中', planStart:'2026-06-16', planEnd:'2026-09-07', actualStart:'2026-06-23', actualEnd:'', note:'美術需求待確認' },
  { name:'百家樂 Pro', owner:'阿杰', stage:'送審中', planStart:'2026-04-14', planEnd:'2026-06-29', actualStart:'2026-04-14', actualEnd:'', note:'GLI 文件已送出' },
  { name:'幸運輪盤', owner:'雅婷', stage:'規劃中', planStart:'2026-07-07', planEnd:'2026-09-28', actualStart:'', actualEnd:'', note:'等待企劃定案' }
];

function weekStart(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  d.setDate(d.getDate() - ((d.getDay() + 6) % 7));
  return d;
}
function getWeekRange() {
  const min = new Date('2026-04-07'), max = new Date('2026-10-05'), weeks = [];
  const cur = new Date(min);
  while (cur <= max) { weeks.push(new Date(cur)); cur.setDate(cur.getDate() + 7); }
  return weeks;
}

function renderKPI() {
  const counts = {}; STAGES.forEach(s => counts[s] = 0);
  projects.forEach(p => counts[p.stage]++);
  const active = projects.length - counts['已完成'] - counts['未開始'];
  document.getElementById('kpi-cards').innerHTML = `
    <div class="metric-card"><div class="metric-label">總機台數</div><div class="metric-value">${projects.length}</div></div>
    <div class="metric-card"><div class="metric-label">進行中</div><div class="metric-value">${active}</div></div>
    <div class="metric-card"><div class="metric-label">已完成</div><div class="metric-value">${counts['已完成']}</div></div>
    <div class="metric-card"><div class="metric-label">未開始</div><div class="metric-value">${counts['未開始']}</div></div>`;
}

function getFiltered() {
  const o = document.getElementById('filter-owner').value;
  const s = document.getElementById('filter-stage').value;
  return projects.filter(p => (!o || p.owner === o) && (!s || p.stage === s));
}

function renderTable() {
  const filtered = getFiltered();
  document.getElementById('table-body').innerHTML = filtered.map(p => `<tr>
    <td>${p.name}</td><td>${p.owner}</td>
    <td><span class="badge stage-${p.stage}">${p.stage}</span></td>
    <td>${p.planStart}</td><td>${p.planEnd}</td>
    <td>${p.actualStart || '—'}</td><td>${p.actualEnd || '—'}</td><td>${p.note}</td></tr>`).join('');
  // Card view for mobile
  document.getElementById('card-list').innerHTML = filtered.map(p => `<div class="project-card">
    <div class="project-card-title">${p.name} <span class="badge stage-${p.stage}">${p.stage}</span></div>
    <div class="project-card-row"><span>負責人</span><span>${p.owner}</span></div>
    <div class="project-card-row"><span>預計</span><span>${p.planStart} ~ ${p.planEnd}</span></div>
    <div class="project-card-row"><span>實際</span><span>${p.actualStart || '—'} ~ ${p.actualEnd || '—'}</span></div>
    <div class="project-card-row"><span>備註</span><span>${p.note}</span></div></div>`).join('');
}

function renderFilters() {
  const owners = [...new Set(projects.map(p => p.owner))];
  const ownerSel = document.getElementById('filter-owner');
  owners.forEach(o => { const opt = document.createElement('option'); opt.value = o; opt.textContent = o; ownerSel.appendChild(opt); });
  const stageSel = document.getElementById('filter-stage');
  STAGES.forEach(s => { const opt = document.createElement('option'); opt.value = s; opt.textContent = s; stageSel.appendChild(opt); });
  ownerSel.addEventListener('change', renderTable);
  stageSel.addEventListener('change', renderTable);
}

function renderGantt() {
  const weeks = getWeekRange(), total = weeks.length;
  const container = document.getElementById('gantt-chart');
  let html = `<div class="gantt-header"><div class="gantt-header-label">機台</div><div class="gantt-header-timeline">`;
  weeks.forEach(w => { html += `<div class="gantt-week">${w.getMonth()+1}/${w.getDate()}</div>`; });
  html += `</div></div>`;

  projects.forEach(p => {
    html += `<div class="gantt-row"><div class="gantt-row-label" title="${p.name}">${p.name}</div><div class="gantt-row-timeline">`;
    weeks.forEach(() => { html += `<div class="gantt-cell"></div>`; });
    if (p.planStart && p.planEnd) {
      const si = Math.max(0, weeks.findIndex(w => w >= weekStart(p.planStart)));
      let ei = weeks.findIndex(w => w >= weekStart(p.planEnd));
      ei = ei === -1 ? total - 1 : Math.min(ei, total - 1);
      html += `<div class="gantt-bar-planned" style="left:${si/total*100}%;width:${(ei-si+1)/total*100}%;background:${STAGE_COLORS[p.stage]};"></div>`;
    }
    if (p.actualStart) {
      const as = weekStart(p.actualStart);
      const ae = p.actualEnd ? weekStart(p.actualEnd) : weekStart(new Date().toISOString().slice(0,10));
      const si = Math.max(0, weeks.findIndex(w => w >= as));
      let ei = weeks.findIndex(w => w >= ae);
      ei = ei === -1 ? total - 1 : Math.min(ei, total - 1);
      html += `<div class="gantt-bar-actual" style="left:${si/total*100}%;width:${(ei-si+1)/total*100}%;background:${STAGE_COLORS[p.stage]};"></div>`;
    }
    html += `</div></div>`;
  });
  container.innerHTML = html;
}

renderKPI(); renderFilters(); renderTable(); renderGantt();
</script>
</body>
</html>
